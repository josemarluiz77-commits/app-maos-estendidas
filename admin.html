<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}
header{
background:#000;
padding:20px;
color:gold;
}
.card{
background:#121212;
padding:20px;
margin:15px;
border-radius:10px;
}
input, textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#1c1c1c;
color:white;
border:none;
border-radius:8px;
}
button{
margin-top:10px;
padding:12px;
width:100%;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
}
#status{
margin-top:10px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>Painel Admin</h1>
</header>

<div class="card">
<h2>Versículo</h2>
<input id="versiculo">
<input id="referencia">
<button onclick="salvarVersiculo()">Salvar</button>
</div>

<div class="card">
<h2>Áudio</h2>
<input id="audio">
<button onclick="salvarAudio()">Salvar</button>
</div>

<div class="card">
<h2>Vídeo</h2>
<input id="video">
<button onclick="salvarVideo()">Salvar</button>
</div>

<div class="card">
<h2>Mensagem</h2>
<textarea id="mensagem"></textarea>
<button onclick="salvarMensagem()">Salvar</button>
</div>

<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyChFlUeEs9OPtb8g-lhTiiNoDp_YegEI-s",
  authDomain: "comunidademaosestendidas.firebaseapp.com",
  databaseURL: "https://comunidademaosestendidas-default-rtdb.firebaseio.com",
  projectId: "comunidademaosestendidas",
  storageBucket: "comunidademaosestendidas.firebasestorage.app",
  messagingSenderId: "115001016227",
  appId: "1:115001016227:web:0df485d449944fea496416"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function salvarVersiculo(){
db.ref("versiculoDoDia").set({
texto: document.getElementById("versiculo").value,
referencia: document.getElementById("referencia").value
});
document.getElementById("status").innerText="✔ Salvo!";
}

function salvarAudio(){
db.ref("audioDoDia").set({
url: document.getElementById("audio").value
});
document.getElementById("status").innerText="✔ Salvo!";
}

function salvarVideo(){
let link = document.getElementById("video").value;
let id = "";

if(link.includes("v=")){
id = link.split("v=")[1].split("&")[0];
}else if(link.includes("youtu.be/")){
id = link.split("youtu.be/")[1];
}else{
id = link;
}

db.ref("videoDoDia").set({url:id});
document.getElementById("status").innerText="✔ Salvo!";
}

function salvarMensagem(){
db.ref("mensagemDoDia").set({
texto: document.getElementById("mensagem").value
});
document.getElementById("status").innerText="✔ Salvo!";
}
</script>

</body>
</html>
