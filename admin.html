<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
text-align:center;
}
header{
background:#000;
padding:20px;
color:gold;
}
.card{
background:#121212;
padding:20px;
margin:15px;
border-radius:10px;
}
input, textarea, select{
width:100%;
padding:10px;
margin-top:10px;
background:#1c1c1c;
color:white;
border:none;
border-radius:8px;
}
button{
margin-top:10px;
padding:12px;
width:100%;
background:gold;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
button:hover{opacity:0.9;}
.excluir{
background:#8b0000;
color:white;
margin-top:5px;
}
#status{
margin-top:10px;
color:#aaa;
}
</style>
</head>

<body>

<script>
// 🔐 PROTEÇÃO
let senha = prompt("Digite a senha do Painel Admin:");
if(senha !== "1234"){
document.body.innerHTML = "<h1 style='color:red;margin-top:50px;'>Acesso negado</h1>";
throw new Error("Acesso bloqueado");
}
</script>

<header>
<h1>Painel Admin</h1>
</header>

<div class="card">
<h2>📖 Versículo</h2>
<input id="versiculo" placeholder="Texto">
<input id="referencia" placeholder="Referência">
<button onclick="salvarVersiculo()">Salvar</button>
</div>

<div class="card">
<h2>🎧 Áudio do Dia</h2>
<input id="audio" placeholder="Link MP3">
<button onclick="salvarAudio()">Salvar</button>
</div>

<div class="card">
<h2>📺 Vídeo</h2>
<input id="video" placeholder="Link YouTube">
<button onclick="salvarVideo()">Salvar</button>
</div>

<div class="card">
<h2>💬 Mensagem</h2>
<textarea id="mensagem" placeholder="Mensagem do dia"></textarea>
<button onclick="salvarMensagem()">Salvar</button>
</div>

<div class="card">
<h2>🎧 Adicionar Áudio</h2>

<input id="tituloAudio" placeholder="Título do áudio">
<input id="linkAudio" placeholder="Link do áudio (MP3)">

<select id="tipoAudio">
<option value="pastor">Palavra do Pastor</option>
<option value="oracao">Oração</option>
<option value="devocional">Devocional</option>
<option value="campanha">Campanha</option>
</select>

<button onclick="salvarAudioLista()">Salvar na Biblioteca</button>
</div>

<div class="card">
<h2>📋 Áudios Cadastrados</h2>
<div id="listaAudios"></div>
</div>

<p id="status"></p>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyChFlUeEs9OPtb8g-lhTiiNoDp_YegEI-s",
  authDomain: "comunidademaosestendidas.firebaseapp.com",
  databaseURL: "https://comunidademaosestendidas-default-rtdb.firebaseio.com",
  projectId: "comunidademaosestendidas",
  storageBucket: "comunidademaosestendidas.firebasestorage.app",
  messagingSenderId: "115001016227",
  appId: "1:115001016227:web:0df485d449944fea496416"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// STATUS
function status(msg){
document.getElementById("status").innerText = msg;
setTimeout(()=>{document.getElementById("status").innerText=""},3000);
}

// VERSÍCULO
function salvarVersiculo(){
db.ref("versiculoDoDia").set({
texto: versiculo.value,
referencia: referencia.value
});
versiculo.value="";
referencia.value="";
status("✔ Versículo salvo!");
}

// ÁUDIO DIA
function salvarAudio(){
db.ref("audioDoDia").set({
url: audio.value
});
audio.value="";
status("✔ Áudio do dia salvo!");
}

// VÍDEO
function salvarVideo(){
let link = video.value;
let id = "";

if(link.includes("v=")){
id = link.split("v=")[1].split("&")[0];
}else if(link.includes("youtu.be/")){
id = link.split("youtu.be/")[1];
}else{
id = link;
}

db.ref("videoDoDia").set({url:id});
video.value="";
status("✔ Vídeo salvo!");
}

// MENSAGEM
function salvarMensagem(){
db.ref("mensagemDoDia").set({
texto: mensagem.value
});
mensagem.value="";
status("✔ Mensagem salva!");
}

// ADICIONAR ÁUDIO
function salvarAudioLista(){

let titulo = tituloAudio.value;
let url = linkAudio.value;
let tipo = tipoAudio.value;

if(!titulo || !url){
status("⚠️ Preencha tudo!");
return;
}

let novo = db.ref("audios").push();

novo.set({
titulo: titulo,
url: url,
tipo: tipo.toLowerCase() // 🔥 correção importante
});

tituloAudio.value="";
linkAudio.value="";

status("🔥 Áudio adicionado!");
}

// LISTAR ÁUDIOS (CORRIGIDO)
db.ref("audios").on("value", snap=>{

let dados = snap.val();
let lista = document.getElementById("listaAudios");

lista.innerHTML = "";

// 🔥 evita erro quando vazio
if(!dados){
lista.innerHTML = "<p>Nenhum áudio cadastrado</p>";
return;
}

for(let id in dados){

let a = dados[id];

lista.innerHTML += `
<div class="card">
<p><strong>${a.titulo}</strong> (${a.tipo})</p>
<button class="excluir" onclick="excluirAudio('${id}')">Excluir</button>
</div>
`;
}
});

// EXCLUIR
function excluirAudio(id){
if(confirm("Deseja excluir este áudio?")){
db.ref("audios/"+id).remove();
status("❌ Áudio removido!");
}
}
</script>

</body>
</html>
